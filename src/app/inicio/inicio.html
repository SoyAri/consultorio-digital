<!-- Header -->
<header 
  class="fixed w-full z-50 transition-all duration-300"
  [ngClass]="isScrolled ? 'bg-white shadow-md py-2' : 'bg-transparent py-4'"
>
  <div class="container mx-auto px-4 flex justify-between items-center">
    <!-- Logo -->
    <div class="flex items-center gap-2 cursor-pointer" (click)="scrollTo('inicio')">
      <span class="text-2xl">🦷</span>
      <span class="text-xl font-bold text-teal-600">Clinic Dentall</span>
    </div>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-8">
      <a (click)="scrollTo('inicio')" class="text-gray-700 hover:text-teal-600 font-medium cursor-pointer transition-colors">Inicio</a>
      <a (click)="scrollTo('servicios')" class="text-gray-700 hover:text-teal-600 font-medium cursor-pointer transition-colors">Servicios</a>
      <a (click)="scrollTo('nosotros')" class="text-gray-700 hover:text-teal-600 font-medium cursor-pointer transition-colors">Nosotros</a>
      <a (click)="scrollTo('contacto')" class="text-gray-700 hover:text-teal-600 font-medium cursor-pointer transition-colors">Contacto</a>
      <button 
        (click)="openModal()"
        class="bg-teal-600 text-white px-6 py-2 rounded-full font-semibold hover:bg-teal-700 transition-all shadow-md active:scale-95"
      >
        Acceso
      </button>
    </nav>

    <!-- Mobile Menu Button -->
    <button (click)="toggleMenu()" class="md:hidden text-teal-600 p-2">
      <svg *ngIf="!isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
      </svg>
      <svg *ngIf="isMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div 
    class="md:hidden absolute top-full left-0 w-full bg-white shadow-xl overflow-hidden transition-all duration-300 border-t border-gray-100"
    [style.max-height]="isMenuOpen ? '400px' : '0'"
  >
    <div class="flex flex-col p-4 gap-4">
      <a (click)="scrollTo('inicio')" class="text-gray-700 text-lg font-medium border-b border-gray-50 pb-2">Inicio</a>
      <a (click)="scrollTo('servicios')" class="text-gray-700 text-lg font-medium border-b border-gray-50 pb-2">Servicios</a>
      <a (click)="scrollTo('nosotros')" class="text-gray-700 text-lg font-medium border-b border-gray-50 pb-2">Nosotros</a>
      <a (click)="scrollTo('contacto')" class="text-gray-700 text-lg font-medium border-b border-gray-50 pb-2">Contacto</a>
      <button 
        (click)="openModal()"
        class="bg-teal-600 text-white px-6 py-3 rounded-xl font-bold text-center mt-2 shadow-lg"
      >
        Acceso
      </button>
    </div>
  </div>
</header>

<!-- Modal de Acceso -->
<div 
  *ngIf="isModalOpen"
  class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in"
  (click)="closeModal()"
>
  <div 
    class="bg-white rounded-2xl w-full max-w-md p-8 relative shadow-2xl scale-up"
    (click)="$event.stopPropagation()"
  >
    <!-- Close Button -->
    <button 
      (click)="closeModal()"
      class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-colors"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="text-center mb-8">
      <h3 class="text-2xl font-bold text-gray-800">Selecciona tu acceso</h3>
      <p class="text-gray-500 mt-2">Bienvenido a Clinic Dentall</p>
    </div>

    <div class="grid gap-4">
      <button 
        (click)="navigateTo('/login/paciente')"
        class="flex items-center gap-4 p-5 rounded-xl border-2 border-gray-100 hover:border-teal-500 hover:bg-teal-50 group transition-all"
      >
        <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
          👤
        </div>
        <div class="text-left">
          <p class="font-bold text-gray-800">Paciente</p>
          <p class="text-sm text-gray-500">Consulta tus citas y expediente</p>
        </div>
      </button>

      <button 
        (click)="navigateTo('/login/equipo')"
        class="flex items-center gap-4 p-5 rounded-xl border-2 border-gray-100 hover:border-teal-500 hover:bg-teal-50 group transition-all"
      >
        <div class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
          👨‍⚕️
        </div>
        <div class="text-left">
          <p class="font-bold text-gray-800">Doctor / Secretaria</p>
          <p class="text-sm text-gray-500">Gestión clínica y administrativa</p>
        </div>
      </button>
    </div>
  </div>
</div>

<main id="inicio">
  <!-- Resto de secciones se añadirán en las siguientes tareas -->
</main>
